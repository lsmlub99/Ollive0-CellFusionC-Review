# re-activate schedule 2026-05-21
name: Collect Reviews & Rank

on:
  schedule:
    - cron: '0 21 * * *'  # 06:00 KST
    - cron: '0 7 * * *'   # 16:00 KST
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline (review collector)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BRAND_CODE: ${{ secrets.BRAND_CODE }}
        run: python -m collector.pipeline

      - name: Run rank collector
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BRAND_CODE: ${{ secrets.BRAND_CODE }}
        run: python -m collector.rank_collector

      - name: Notify failure
        if: failure()
        run: |
          curl -s -X POST -H "Content-type: application/json" \
            --data "{\"text\":\"[리뷰/순위 수집 실패] GitHub Actions 워크플로우 오류\n실행 로그: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "${{ secrets.SWIT_WEBHOOK_URL }}"
