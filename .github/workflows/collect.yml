name: Oliveyoung Review Collector
# GitHub Actions datacenter IPs are blocked by Cloudflare.
# Collection runs locally via Windows Task Scheduler (run_collector.bat).
# This workflow is kept for manual dispatch only (e.g. testing infra).

on:
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collector
        env:
          DATABASE_URL: "${{ secrets.DATABASE_URL }}"
          BRAND_CODE: "${{ secrets.BRAND_CODE }}"
        run: python -m collector.pipeline
