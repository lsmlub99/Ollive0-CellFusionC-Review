services:
  - type: web
    name: cellfusion-reviews
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run dashboard/app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0

  - type: web
    name: oliveyoung-mcp
    runtime: python
    rootDir: mcp-server
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: MCP_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
